name: Bug report
description: Report a reproducible problem in StackScope
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before submitting, please confirm this is a reproducible issue in the latest version.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: I am using the latest StackScope version available to me.
          required: true
        - label: I searched existing issues for duplicates.
          required: true
        - label: I can reproduce this issue consistently.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short and clear description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Memory view
        - Register panel
        - Register set editor
        - Presets
        - Session state / refresh
        - Protocol / host-webview bridge
        - Other
    validations:
      required: true
  - type: dropdown
    id: debugger
    attributes:
      label: Debug adapter
      description: Adapter used in your session
      options:
        - cppdbg
        - cortex-debug
        - lldb
        - gdb (other integration)
        - Other / unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps with values if possible
      placeholder: |
        1. Start debug session with ...
        2. Open StackScope panel
        3. Pause at ...
        4. Open target ...
        5. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / trace (optional)
      description: Paste relevant output, stack traces, or screenshots
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - VS Code version:
        - StackScope version:
        - Adapter version (if known):
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        Current known scope of StackScope V1:

        - Memory inspection from paused sessions
        - Register panel (read-only)
        - Workspace-scoped presets and register sets

        Planned future improvements include richer call stack integration and improved cross-highlighting between hex and decoded columns.
